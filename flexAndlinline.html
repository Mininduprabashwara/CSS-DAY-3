<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0 ;
            padding: 0;
            font-family:sans-serif ;
        }
        .one, .two, .three, .four{
            padding: 20px;
            text-align: center;
            font-size: 36px;
            color: black;
            font-weight: bold;
        }
        .one{
         background-color: rgb(235, 13, 13);
         flex-grow: 1;
        }
        .two{
            background-color: rgb(19, 236, 236);
            font-size: 80px;
             flex-grow: 2;
        }
        .three{
            background-color: rgb(205, 226, 43);
            font-size: 50px;
             flex-grow: 3;
        }
        .four{
            background-color: rgb(29, 231, 7);
            font-size: 25px;
             flex-grow: 4;
        }
        .flexiblbox{
            border: 5px solid;
            display: flex;
            height: 200px;
            align-items: flex-start;
            align-items: flex-end;
            align-items: center;
            align-items: stretch;
            align-items: baseline;
            align-items: normal;
        }
    </style>
</head>
<body>   
 <div class="flexiblbox">
    <p class="one">A</p>
    <p class="two">B</p>
    <p class="three">C</p>
    <p class="four">D</p>
 </div>
 
</body>
</html>
